apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: backend-namespace
  name: backend-deployment
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-app
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-app
    spec:
      # serviceAccountName: backend-serviceaccount #コンテナがAWSサービスにアクセスする際に必要
      containers:
      - image: 140083316867.dkr.ecr.us-east-1.amazonaws.com/backend:latest  #コンテナイメージを指定する
        resources:
          limits:
            memory: "700Mi"  #Fargateはメモリ予約に 256 MB追加される
            cpu: "0.5"
          requests:
            memory: "700Mi"
            cpu: "0.5"
        imagePullPolicy: Always
        name: backend-app
        ports:
        - containerPort: 80