apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: keycloak
  name: keycloak-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-app
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodegroup
                    operator: In
                    values:
                      - keycloak
      containers:
        - name: keycloak-app
          image: 549209747641.dkr.ecr.us-east-1.amazonaws.com/keycloak:latest
          imagePullPolicy: Always
          command:
            - /opt/keycloak/bin/kc.sh
            - start
            - --optimized

          env:
            # ============================
            # Keycloak 管理ユーザー
            # ============================
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: password

            # ============================
            # データベース設定（PostgreSQL）
            # ============================
            - name: KC_DB
              value: postgres
            - name: KC_DB_USERNAME
              value: postgres
            - name: KC_DB_PASSWORD
              value: password
            - name: KC_DB_URL_HOST
              value: keycloak.cluster-cm5eeaqmqanh.us-east-1.rds.amazonaws.com
            - name: KC_DB_URL_PORT
              value: "10540"
            - name: KC_DB_URL_DATABASE
              value: keycloak
            - name: KC_DB_SCHEMA
              value: public

            # ============================
            # HTTP / Proxy 設定
            # ============================
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY
              value: edge
            - name: KC_PROXY_HEADERS
              value: xforwarded

            # ============================
            # Hostname / URL 設定
            # ============================
            - name: KC_HOSTNAME
              value: keycloak.oyaizu.gorin.toro.toyota
            - name: KC_HOSTNAME_STRICT
              value: "false"

            # ============================
            # 管理系エンドポイント
            # ============================
            - name: KC_HTTP_MANAGEMENT_HEALTH_ENABLED
              value: "false"

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "0.5"
              memory: "1.5Gi"
            limits:
              cpu: "1"
              memory: "2Gi"