apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {リポジトリURL}
    targetRevision: main
    path: manifest/overlays
  destination:
    server: https://kubernetes.default.svc
    namespace: {名前空間}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true