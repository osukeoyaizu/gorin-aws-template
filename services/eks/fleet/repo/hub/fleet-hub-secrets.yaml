apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: fleet-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # 先に作成
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets        # ← namespace は指定しない（同一NS前提）
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleet-spoke-registration-template
  namespace: fleet-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"     # SecretStore 後に作成
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    name: spoke-registration-PLACEHOLDER
    creationPolicy: Owner
  data:
    - secretKey: clusterName
      remoteRef:
        key: /fleet/members/PLACEHOLDER/registration
        property: clusterName
    - secretKey: clusterArn
      remoteRef:
        key: /fleet/members/PLACEHOLDER/registration
        property: clusterArn
    - secretKey: clusterEndpoint
      remoteRef:
        key: /fleet/members/PLACEHOLDER/registration
        property: clusterEndpoint
    - secretKey: certificateAuthorityData
      remoteRef:
        key: /fleet/members/PLACEHOLDER/registration
        property: certificateAuthorityData
