version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - pip install -r requirements.txt -t .
  build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - '__pycache__/**'
    - '**/*.pyc'
    - 'buildspec.yaml'
