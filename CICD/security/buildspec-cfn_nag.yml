# CloudFormationテンプレートにおけるセキュリティ上の問題点を検出する
version: 0.2
phases:
  install:
    runtime-versions:
      ruby: 3.1
    commands:
      - apt-get update -y
      - gem install cfn-nag
  build:
    commands:
      - |
        pwdir=$(pwd)
        cfn_nag_scan --input-path $pwdir/src/cfn_nag_template.yaml
