AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Service with 2 Tasks

Parameters:
  EnvironmentName:
    Description: リソース名のプレフィックスとなる環境名
    Type: String
    Default: vpc01

  Cpu:
    Description: タスクに予約するCPU量（例：256は256 CPUシェア）
    Type: Number
    Default: 256

  Memory:
    Description: タスクに予約するメモリ量（例：512は512 MiB）
    Type: Number
    Default: 512

Resources:
  # ECSクラスター
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-ecs-cluster  # 環境名に基づくクラスター名
      Tags:
        - Key: !ImportValue TagKey  # タグのキーをインポート
          Value: !ImportValue TagValue  # タグの値をインポート

  # ECS用セキュリティグループ
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to ECS containers  # ECSコンテナへのHTTPトラフィックを許可
      VpcId: !ImportValue VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup  # ALBからのトラフィックを許可
      Tags:
        - Key: !ImportValue TagKey
          Value: !ImportValue TagValue

  # ターゲットグループ
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-target-group  # 環境名に基づくターゲットグループ名
      VpcId: !ImportValue VpcId
      Protocol: HTTP
      Port: 80
      TargetType: ip
      HealthCheckPath: /  # ヘルスチェックパス
      HealthCheckIntervalSeconds: 30  # ヘルスチェック間隔
      HealthCheckTimeoutSeconds: 5  # ヘルスチェックタイムアウト
      HealthyThresholdCount: 2  # ヘルシーとみなすための閾値
      UnhealthyThresholdCount: 2  # アンヘルシーとみなすための閾値
      Tags:
        - Key: !ImportValue TagKey
          Value: !ImportValue TagValue

  # ALB用セキュリティグループ
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic to ALB  # ALBへのHTTPトラフィックを許可
      VpcId: !ImportValue VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: pl-58a04531  # 特定のプレフィックスリストからのトラフィックを許可
      Tags:
        - Key: !ImportValue TagKey
          Value: !ImportValue TagValue

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-ecs-alb  # 環境名に基づくALB名
      Subnets:
        - !ImportValue PublicSubnet1Id  # パブリックサブネット1
        - !ImportValue PublicSubnet2Id  # パブリックサブネット2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Scheme: internet-facing  # インターネット向け

  # Load Balancerのリスナー
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer  # ALBのARN
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward  # デフォルトアクションとしてフォワード
          TargetGroupArn: !Ref TargetGroup  # ターゲットグループのARN

  # アプリケーションオートスケーリング用のIAMロール
  ApplicationAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecs-autoscaling-role  # 環境名に基づくロール名
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com  # オートスケーリングサービスのためのプリンシパル
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${EnvironmentName}-ecs-autoscaling-policy  # 環境名に基づくポリシー名
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - application-autoscaling:*  # アプリケーションオートスケーリングに関するアクションを許可
                Resource: '*'

  # タスク定義
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-task  # 環境名に基づくタスクファミリー名
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE  # Fargateを使用
      Cpu: !Ref Cpu  # パラメータからCPUを取得
      Memory: !Ref Memory  # パラメータからメモリを取得
      ContainerDefinitions:
        - Name: app-container  # コンテナ名
          Image: nginx:latest  # コンテナイメージ
          PortMappings:
            - ContainerPort: 80  # コンテナポート
              Protocol: tcp
          Essential: true  # 必須コンテナ
      Tags:
        - Key: !ImportValue TagKey
          Value: !ImportValue TagValue

  # ECSサービス
  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - ALBListener  # ALBリスナーに依存
    Properties:
      ServiceName: !Sub ${EnvironmentName}-ecs-service  # 環境名に基づくサービス名
      Cluster: !Ref MyECSCluster
      DesiredCount: 2  # タスクの希望数
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE  # Fargateを使用
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue PrivateSubnet1Id  # プライベートサブネット1
            - !ImportValue PrivateSubnet2Id  # プライベートサブネット2
          SecurityGroups:
            - !Ref ECSSecurityGroup  # ECS用セキュリティグループ
          AssignPublicIp: DISABLED  # パブリックIPを割り当てない
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: app-container  # コンテナ名
          ContainerPort: 80  # コンテナポート
      Tags:
        - Key: !ImportValue TagKey
          Value: !ImportValue TagValue

  # Auto Scaling Target
  ScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn:
      - MyECSCluster
      - Service
    Properties:
      MaxCapacity: 4  # 最大キャパシティ
      MinCapacity: 2  # 最小キャパシティ
      ResourceId: !Sub service/${EnvironmentName}-ecs-cluster/${EnvironmentName}-ecs-service  # リソースID
      RoleARN: !GetAtt ApplicationAutoScalingRole.Arn  # IAMロールのARN
      ScalableDimension: ecs:service:DesiredCount  # スケーラブルディメンション
      ServiceNamespace: ecs  # サービスネームスペース

  # スケーリングポリシー
  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-scale-out  # 環境名に基づくポリシー名
      PolicyType: TargetTrackingScaling  # ターゲットトラッキングスケーリング
      ScalingTargetId: !Ref ScalingTarget  # スケーリングターゲットのID
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50  # ターゲット値（CPU使用率50%）
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization  # メトリックタイプ
        ScaleInCooldown: 300  # スケールインクールダウン
        ScaleOutCooldown: 300  # スケールアウトクールダウン

Outputs:
  ECSClusterName:
    Description: The name of the ECS cluster  # ECSクラスターの名前
    Value: !Ref MyECSCluster

  ServiceName:
    Description: The name of the ECS service  # ECSサービスの名前
    Value: !Ref Service

  LoadBalancerDNS:
    Description: DNS name of the load balancer  # Load BalancerのDNS名
    Value: !GetAtt ApplicationLoadBalancer.DNSName
